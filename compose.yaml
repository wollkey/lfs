services:
  web:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: development
    ports:
      - "127.0.0.1:8000:8080"
    volumes:
      - .:/var/www
      - ./.docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      APP_ENV: dev
      PHP_IDE_CONFIG: "serverName=Docker"
